name: Update deadline calendar

# 매주 달력 데이터 창(오늘 기준 -60일 ~ +400일)을 앞으로 굴려서
# 캘린더가 항상 앞으로 1년 치 예상 마감일을 보여주도록 유지한다.
on:
  schedule:
    - cron: "0 18 * * 0" # 매주 일요일 18:00 UTC = 월요일 03:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Roll deadline window forward
        run: python3 scripts/update_deadlines.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes — calendar window already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deadlines.json docs/assets/deadlines.js docs/index.html
          git commit -m "chore: roll deadline calendar window forward"
          git push
